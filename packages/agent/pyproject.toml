[project]
name = "remotion-agent"
version = "0.1.0"
description = "DeepAgents orchestrator for Remotion video generation"
requires-python = ">=3.12"
dependencies = [
    "deepagents>=0.1.0",
    "langgraph>=0.4.0",
    "langchain>=0.3.0",
    "langchain-google-genai>=4.0.0",
    "fastapi>=0.115.0",
    "uvicorn>=0.34.0",
    "httpx>=0.28.0",
    "python-dotenv>=1.1.0",
    "deepagents-cli>=0.0.41",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.25.0",
    "respx>=0.22.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
